<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Searcho</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 18px;
    padding: 14px 18px;
    font-size: 13px;
    color: #3c4043;
  }
  .topbar a { color: #3c4043; text-decoration: none; }
  .topbar .gridicon {
    width: 24px; height: 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    opacity: .8;
  }
  .topbar .gridicon span { background: #5f6368; border-radius: 1px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg,#7b9cff,#4a6cf7);
    color: #fff; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  /* center */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 22px;
    margin-top: 18vh;
  }

  .logo {
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -3px;
    margin-bottom: 30px;
    user-select: none;
  }
  .logo .b { color: #4285f4; }
  .logo .e { color: #ea4335; }
  .logo .a1 { color: #fbbc05; }
  .logo .r { color: #4285f4; }
  .logo .c { color: #34a853; }
  .logo .h { color: #ea4335; }
  .logo .o { color: #fbbc05; }

  .searchbox {
    width: 100%;
    max-width: 580px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #dfe1e5;
    border-radius: 26px;
    padding: 13px 18px;
    box-shadow: 0 1px 6px rgba(32,33,36,.12);
    transition: box-shadow .15s;
  }
  .searchbox:focus-within {
    box-shadow: 0 1px 10px rgba(32,33,36,.22);
    border-color: transparent;
  }
  .searchbox svg { flex-shrink: 0; }
  .searchbox input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 17px;
    color: #202124;
    background: transparent;
    font-family: arial, sans-serif;
  }
  .mic {
    width: 22px; height: 22px; flex-shrink: 0;
  }

  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .buttons button {
    background: #f8f9fa;
    border: 1px solid #f8f9fa;
    border-radius: 4px;
    color: #3c4043;
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    font-family: arial, sans-serif;
  }
  .buttons button:hover {
    border-color: #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
  }

  .lang {
    margin-top: 26px;
    font-size: 13px;
    color: #4d5156;
    text-align: center;
  }
  .lang a { color: #1a0dab; text-decoration: none; }

  /* footer */
  footer {
    background: #f2f2f2;
    color: #70757a;
    font-size: 14px;
    margin-top: auto;
  }
  footer .row {
    padding: 14px 22px;
    border-bottom: 1px solid #dadce0;
  }
  footer .row.links {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: none;
  }
  footer a { color: #70757a; text-decoration: none; }

  @media (max-width: 500px) {
    .logo { font-size: 52px; }
    .center { margin-top: 12vh; }
    .buttons { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <a href="#">Gmail</a>
    <a href="#">الصور</a>
    <div class="gridicon">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="avatar">R</div>
  </div>

  <div class="center">
    <div class="logo">
      <span class="b">S</span><span class="e">e</span><span class="a1">a</span><span class="r">r</span><span class="c">c</span><span class="h">h</span><span class="o">o</span>
    </div>

    <div class="searchbox">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="q" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="بحث">
      <svg class="mic" viewBox="0 0 24 24">
        <path fill="#4285f4" d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3z"/>
        <path fill="#34a853" d="M11 18.92V22h2v-3.08A7 7 0 0019 12h-2a5 5 0 01-10 0H5a7 7 0 006 6.92z"/>
        <path fill="#ea4335" d="M12 14a3 3 0 003-3h-2a1 1 0 01-2 0H9a3 3 0 003 3z" opacity=".0"/>
      </svg>
    </div>

    <div class="buttons">
      <button>بحث Searcho</button>
      <button>ضربة حظ</button>
    </div>

    <div class="lang">
      Searcho متوفر باللغة: <a href="#">English</a> <a href="#">한국어</a> <a href="#">日本語</a> <a href="#">中文</a>
    </div>
  </div>

  <footer>
    <div class="row">كوريا الجنوبية</div>
    <div class="row links">
      <a href="#">حول</a>
      <a href="#">إعلانات</a>
      <a href="#">الأعمال</a>
      <a href="#">كيف يعمل البحث</a>
      <a href="#" style="margin-right:auto;">الخصوصية</a>
      <a href="#">الشروط</a>
      <a href="#">الإعدادات</a>
    </div>
  </footer>

<script>
  // focus the search box on load so typing works immediately
  const q = document.getElementById('q');
  window.addEventListener('load', () => q.focus());
  // pressing Enter does nothing (filming only — no real search)
  q.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
</script>
</body>
</html>
